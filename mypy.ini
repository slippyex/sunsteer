[mypy]
python_version = 3.12
# Third-party stubs (psycopg2, prometheus_client, PyViCare, fastapi, …) aren't installed in
# the lint job; we type-check our own code only.
ignore_missing_imports = True
# Scoped, PASSING gate: the typed pure cores (decision/threshold/config, extract, ratebudget,
# decoder) and the data-access boundaries (dblog, tsdb_writer, relays, drivers registry). The
# orchestration loops and FastAPI handlers are intentionally not fully annotated yet, so they
# are out of scope rather than forcing `# type: ignore` noise. The exact file list lives in
# the CI `mypy` step (.github/workflows/ci.yml); grow it as modules gain hints.

# Sunsteer — production stack. Copy .env.example to .env, fill in the required
# values, then:  docker compose up -d          (pulls released images from GHCR)
# Build from source instead:  docker compose up -d --build
# Optional monitoring:  docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
# Optional ViCare telemetry:  docker compose --profile vicare up -d

services:
  timescaledb:
    # Digest-pinned (PG 16.11). Bump deliberately.
    image: timescale/timescaledb@sha256:22e8a5ae7aef121d1537afe946dd7cc5deeeb63ab36ce19849d671bd3b663509
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME:-energy}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"   # loopback only: the host-network exporter connects here
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-energy}"]
      interval: 5s
      timeout: 3s
      retries: 12
    # Resource limits mirror deploy/k8s so a leak/runaway can't OOM the whole host (e.g. a
    # Raspberry Pi), which would take down the safety-critical control loop. Honoured by
    # `docker compose up` (Compose v2).
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 2G }
    security_opt: [ "no-new-privileges:true" ]   # cap_drop omitted: postgres needs SETUID/SETGID
    restart: unless-stopped

  db-migrate:
    # Applies db/migrations/*.sql in order on every start. Scripts are idempotent
    # (IF NOT EXISTS guards), so re-running is safe. No-op while the dir is empty.
    image: timescale/timescaledb@sha256:22e8a5ae7aef121d1537afe946dd7cc5deeeb63ab36ce19849d671bd3b663509
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASS}
    volumes:
      - ../../db/migrations:/migrations:ro
    entrypoint: ["/bin/sh", "-c",
      "for f in $$(find /migrations -name '*.sql' | sort); do echo \"applying $$f\"; psql -h timescaledb -U ${DB_USER} -d ${DB_NAME:-energy} -v ON_ERROR_STOP=1 -f $$f || exit 1; done; echo 'migrations done'"]
    security_opt: [ "no-new-privileges:true" ]   # transient psql client — needs no caps
    cap_drop: [ "ALL" ]
    restart: "no"

  energy-exporter:
    image: ghcr.io/slippyex/sunsteer/energy-exporter:${SUNSTEER_VERSION:-0.6.0}
    build: ../../services/energy-exporter
    # Host network is REQUIRED for the SMA Speedwire multicast (239.12.255.254:9522) —
    # it does not cross Docker's bridge NAT. Ports 9120 (metrics) / 9121 (/state) bind
    # on the host.
    network_mode: host
    environment:
      METER_DRIVER: ${METER_DRIVER:-sma_shm}
      SHM_HOST: ${SHM_HOST}
      SHELLY_URL: ${SHELLY_URL}
      INVERTER_HOST: ${INVERTER_HOST:-}
      INVERTER_PORT: ${INVERTER_PORT:-502}
      INVERTER_UNIT_ID: ${INVERTER_UNIT_ID:-3}
      TSDB_FLUSH_SECONDS: ${TSDB_FLUSH_SECONDS:-60}   # write cadence; UI uses the same var
      STATE_BIND: ${STATE_BIND:-}   # empty = all interfaces; set an IP to restrict /state
      DB_HOST: 127.0.0.1          # host network -> published loopback port of timescaledb
      DB_NAME: ${DB_NAME:-energy}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9121/state', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 4
    security_opt: [ "no-new-privileges:true" ]
    cap_drop: [ "ALL" ]
    deploy:
      resources:
        limits: { cpus: "0.3", memory: 192M }
    restart: unless-stopped

  surplus-controller:
    image: ghcr.io/slippyex/sunsteer/surplus-controller:${SUNSTEER_VERSION:-0.6.0}
    build: ../../services/surplus-controller
    environment:
      EXPORTER_STATE_URL: http://host.docker.internal:9121/state   # exporter runs on the host net
      SHELLY_URL: ${SHELLY_URL}
      PV_LAT: ${PV_LAT}
      PV_LON: ${PV_LON}
      PV_TZ: ${PV_TZ:-UTC}
      PV_PLANES: ${PV_PLANES}
      SHELLY_AUTOOFF_SECONDS: ${SHELLY_AUTOOFF_SECONDS:-60}
      DB_HOST: timescaledb
      DB_NAME: ${DB_NAME:-energy}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9124/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 4
    security_opt: [ "no-new-privileges:true" ]
    cap_drop: [ "ALL" ]
    deploy:
      resources:
        limits: { cpus: "0.3", memory: 192M }
    restart: unless-stopped

  control-ui:
    image: ghcr.io/slippyex/sunsteer/control-ui:${SUNSTEER_VERSION:-0.6.0}
    build: ../../services/control-ui
    environment:
      PV_LAT: ${PV_LAT}
      PV_LON: ${PV_LON}
      PV_TZ: ${PV_TZ:-UTC}
      UI_DEFAULT_LANG: ${UI_DEFAULT_LANG:-en}
      WEATHER_LOCATION: ${WEATHER_LOCATION:-}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-}   # set to the public origin when behind a reverse proxy
      GRAFANA_URL: ${GRAFANA_URL:-}
      SUNSTEER_VERSION: ${SUNSTEER_VERSION:-0.6.0}
      # Must match the exporter's TSDB_FLUSH_SECONDS so runtime/kWh math is correct.
      TSDB_FLUSH_SECONDS: ${TSDB_FLUSH_SECONDS:-60}
      DB_HOST: timescaledb
      DB_NAME: ${DB_NAME:-energy}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    ports:
      # Bind to loopback by default — HTTP Basic auth without TLS must not be exposed on
      # the LAN. Put it behind a reverse proxy with TLS, or set UI_BIND=0.0.0.0 to expose
      # it directly (only on a trusted network).
      - "${UI_BIND:-127.0.0.1}:8080:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 4
    security_opt: [ "no-new-privileges:true" ]
    cap_drop: [ "ALL" ]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
    restart: unless-stopped

  heatpump-exporter:
    image: ghcr.io/slippyex/sunsteer/heatpump-exporter:${SUNSTEER_VERSION:-0.6.0}
    build: ../../services/heatpump-exporter
    profiles: ["vicare"]
    environment:
      HEATPUMP_DRIVER: vicare
      VICARE_USER: ${VICARE_USER:-}
      VICARE_PASS: ${VICARE_PASS:-}
      VICARE_CLIENT_ID: ${VICARE_CLIENT_ID:-}
      VICARE_BUDGET_FILE: ${VICARE_BUDGET_FILE:-/data/vicare_budget.json}
      DB_HOST: timescaledb
      DB_NAME: ${DB_NAME:-energy}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    volumes:
      - vicare-token:/data
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    security_opt: [ "no-new-privileges:true" ]
    cap_drop: [ "ALL" ]
    deploy:
      resources:
        limits: { memory: 128M }
    restart: unless-stopped

volumes:
  pgdata:
  vicare-token:

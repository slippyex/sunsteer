# Sunsteer ZERO-CONFIG DEMO — no hardware, no .env, one command:
#
#   docker compose -f docker-compose.demo.yml up -d          (pulls released images)
# or build from source:
#   docker compose -f docker-compose.demo.yml up -d --build
#
# Then open http://localhost:8080  (login: admin / sunsteer)
# A synthetic PV "day" passes every 10 minutes. Switch the mode to "auto" in the
# UI settings to watch the controller decide. Relay writes fail by design (the
# Shelly URL points at an unroutable documentation address) — bring real hardware
# and use docker-compose.yml for the real thing.

services:
  timescaledb:
    image: timescale/timescaledb@sha256:22e8a5ae7aef121d1537afe946dd7cc5deeeb63ab36ce19849d671bd3b663509  # latest-pg16, digest-pinned
    environment:
      POSTGRES_USER: sunsteer
      POSTGRES_PASSWORD: sunsteer
      POSTGRES_DB: energy
    volumes:
      - demo-pgdata:/var/lib/postgresql/data
      - ../../db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sunsteer -d energy"]
      interval: 5s
      timeout: 3s
      retries: 12
    # Mirror deploy/k8s limits so the demo can't OOM a small host. Honoured by Compose v2.
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 2G }
    security_opt: [ "no-new-privileges:true" ]   # cap_drop omitted: postgres needs SETUID/SETGID

  db-migrate:
    image: timescale/timescaledb@sha256:22e8a5ae7aef121d1537afe946dd7cc5deeeb63ab36ce19849d671bd3b663509  # latest-pg16, digest-pinned
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      PGPASSWORD: sunsteer
    volumes:
      - ../../db/migrations:/migrations:ro
    entrypoint: ["/bin/sh", "-c",
      "for f in $$(find /migrations -name '*.sql' | sort); do echo \"applying $$f\"; psql -h timescaledb -U sunsteer -d energy -v ON_ERROR_STOP=1 -f $$f || exit 1; done; echo 'migrations done'"]
    security_opt: [ "no-new-privileges:true" ]   # transient psql client — needs no caps
    cap_drop: [ "ALL" ]
    restart: "no"

  energy-exporter:
    image: ghcr.io/slippyex/sunsteer/energy-exporter:${SUNSTEER_VERSION:-0.5.2}
    build: ../../services/energy-exporter
    environment:
      METER_DRIVER: mock
      DB_HOST: timescaledb
      DB_NAME: energy
      DB_USER: sunsteer
      DB_PASS: sunsteer
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    security_opt: [ "no-new-privileges:true" ]
    cap_drop: [ "ALL" ]
    deploy:
      resources:
        limits: { cpus: "0.3", memory: 192M }

  surplus-controller:
    image: ghcr.io/slippyex/sunsteer/surplus-controller:${SUNSTEER_VERSION:-0.5.2}
    build: ../../services/surplus-controller
    environment:
      EXPORTER_STATE_URL: http://energy-exporter:9121/state
      SHELLY_URL: http://192.0.2.90        # TEST-NET: unreachable on purpose (demo has no relay)
      PV_LAT: "52.52"
      PV_LON: "13.41"
      PV_PLANES: "[[30,0,5.0]]"
      DB_HOST: timescaledb
      DB_NAME: energy
      DB_USER: sunsteer
      DB_PASS: sunsteer
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    security_opt: [ "no-new-privileges:true" ]
    cap_drop: [ "ALL" ]
    deploy:
      resources:
        limits: { cpus: "0.3", memory: 192M }

  control-ui:
    image: ghcr.io/slippyex/sunsteer/control-ui:${SUNSTEER_VERSION:-0.5.2}
    build: ../../services/control-ui
    environment:
      PV_LAT: "52.52"
      PV_LON: "13.41"
      ADMIN_USER: admin
      ADMIN_PASS: sunsteer
      DB_HOST: timescaledb
      DB_NAME: energy
      DB_USER: sunsteer
      DB_PASS: sunsteer
    ports:
      - "8080:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    security_opt: [ "no-new-privileges:true" ]
    cap_drop: [ "ALL" ]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }

  heatpump-exporter:
    image: ghcr.io/slippyex/sunsteer/heatpump-exporter:${SUNSTEER_VERSION:-0.5.2}
    build: ../../services/heatpump-exporter
    environment:
      HEATPUMP_DRIVER: mock
      DB_HOST: timescaledb
      DB_NAME: energy
      DB_USER: sunsteer
      DB_PASS: sunsteer
    depends_on:
      timescaledb: { condition: service_healthy }
      db-migrate: { condition: service_completed_successfully }
    security_opt: [ "no-new-privileges:true" ]
    cap_drop: [ "ALL" ]
    deploy: { resources: { limits: { memory: 128M } } }

volumes:
  demo-pgdata:

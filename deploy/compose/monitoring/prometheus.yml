global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: energy-exporter
    static_configs:
      - targets: ["host.docker.internal:9120"]   # exporter runs on the host network
  - job_name: surplus-controller
    static_configs:
      - targets: ["surplus-controller:9123"]
  - job_name: heatpump-exporter
    static_configs:
      - targets: ["heatpump-exporter:9125"]        # only resolves with --profile vicare

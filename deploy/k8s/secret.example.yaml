# Copy to secret.yaml, fill in, and DO NOT commit secret.yaml.
#
# secret.yaml is referenced by kustomization.yaml. Replace every CHANGE_ME below.
# The VICARE_* keys are only needed if you deploy vicare-exporter.yaml; otherwise
# they can stay as placeholders (or be removed along with that manifest).
apiVersion: v1
kind: Secret
metadata:
  name: sunsteer-secrets
  namespace: sunsteer
type: Opaque
stringData:
  DB_USER: "CHANGE_ME"
  DB_PASS: "CHANGE_ME"
  ADMIN_PASS: "CHANGE_ME"
  VICARE_USER: "CHANGE_ME"
  VICARE_PASS: "CHANGE_ME"
  VICARE_CLIENT_ID: "CHANGE_ME"

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Example Kubernetes base for Sunsteer. Adapt to your cluster — not a turnkey deploy.
# See README.md in this directory for the full sequence (init.sql ConfigMap +
# secret.yaml must exist before `kubectl apply -k .`).

namespace: sunsteer

resources:
  - namespace.yaml
  - timescaledb.yaml
  - db-migrate-job.yaml
  - energy-exporter.yaml
  - surplus-controller.yaml
  - control-ui.yaml
  # Optional ViCare telemetry — UNCOMMENT to enable (and fill the VICARE_* secret keys).
  # Left off by default: with placeholder creds it would just loop on auth failures.
  # - vicare-exporter.yaml
  # Create from secret.example.yaml (cp secret.example.yaml secret.yaml, fill in).
  # secret.yaml is gitignored — never commit real credentials.
  - secret.yaml

# The Deployment manifests already pin :0.3.0 (so a raw `kubectl apply -f` is reproducible
# too); this block is the single knob to retag via kustomize. Keep both in sync and bump
# on every upgrade — :latest must never deploy control logic.
images:
  - name: ghcr.io/slippyex/sunsteer/energy-exporter
    newTag: "0.3.0"
  - name: ghcr.io/slippyex/sunsteer/surplus-controller
    newTag: "0.3.0"
  - name: ghcr.io/slippyex/sunsteer/control-ui
    newTag: "0.3.0"
  - name: ghcr.io/slippyex/sunsteer/vicare-exporter
    newTag: "0.3.0"

# NOTE: the db-migrate Job mounts a `sunsteer-migrations` ConfigMap built from
# db/migrations/*.sql. It is created manually before `apply -k` (see README step 3),
# the same out-of-tree pattern as the init.sql ConfigMap — kustomize's configMapGenerator
# refuses to read files above this directory.

# heatpump-exporter — OPTIONAL heat-pump telemetry (temperatures, compressor,
# energy counters). Set HEATPUMP_DRIVER=vicare for Viessmann ViCare integration;
# the mock driver needs no creds and is used in the zero-config demo.
# Not using a heat pump? Delete this file and drop it from kustomization.yaml
# (the VICARE_* secret keys then become unused).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: heatpump-exporter
  namespace: sunsteer
spec:
  replicas: 1
  strategy:
    type: Recreate          # single RWO PVC writer (token + budget cache)
  selector:
    matchLabels:
      app: heatpump-exporter
  template:
    metadata:
      labels:
        app: heatpump-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9125"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001        # so the non-root user can write the /data PVC
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: heatpump-exporter
          image: ghcr.io/slippyex/sunsteer/heatpump-exporter:0.5.3  # pinned; kustomize images: bumps it too
          imagePullPolicy: IfNotPresent
          env:
            - { name: PYTHONDONTWRITEBYTECODE, value: "1" }   # readOnlyRootFilesystem
            - { name: HEATPUMP_DRIVER, value: "vicare" }
            - { name: METRICS_PORT, value: "9125" }
            - { name: VICARE_POLL_SECONDS, value: "300" }
            - { name: VICARE_DAILY_CAP, value: "1400" }
            - { name: VICARE_TOKEN_FILE, value: "/data/vicare_token.json" }
            - { name: VICARE_BUDGET_FILE, value: "/data/vicare_budget.json" }
            - { name: DB_HOST, value: "timescaledb" }
            - { name: DB_PORT, value: "5432" }
            - { name: DB_NAME, value: "energy" }
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: sunsteer-secrets, key: DB_USER }
            - name: DB_PASS
              valueFrom:
                secretKeyRef: { name: sunsteer-secrets, key: DB_PASS }
            - name: VICARE_USER
              valueFrom:
                secretKeyRef: { name: sunsteer-secrets, key: VICARE_USER }
            - name: VICARE_PASS
              valueFrom:
                secretKeyRef: { name: sunsteer-secrets, key: VICARE_PASS }
            - name: VICARE_CLIENT_ID
              valueFrom:
                secretKeyRef: { name: sunsteer-secrets, key: VICARE_CLIENT_ID }
          ports:
            - { containerPort: 9125, name: metrics }
          livenessProbe:
            tcpSocket: { port: 9125 }
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          # Write-only sidecar with no Service consumers, but a readiness probe still keeps it
          # out of rotation / surfaces "not ready" cleanly while the metrics server comes up.
          readinessProbe:
            tcpSocket: { port: 9125 }
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true   # only /data (PVC) + /tmp (emptyDir) are writable
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: token, mountPath: /data }
            - { name: tmp, mountPath: /tmp }
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { memory: 128Mi }
      volumes:
        - name: token
          persistentVolumeClaim:
            claimName: vicare-token
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: heatpump-exporter
  namespace: sunsteer
spec:
  selector:
    app: heatpump-exporter
  ports:
    - { name: metrics, port: 9125, targetPort: 9125 }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vicare-token
  namespace: sunsteer
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 64Mi
  # Uses the cluster's default StorageClass.

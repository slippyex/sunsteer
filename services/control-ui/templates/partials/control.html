<section id="control">
  <form hx-post="/control" hx-target="#control" hx-swap="outerHTML">

    {# ── Mode buttons: AUTO / MANUELL / PAUSE ──────────────────── #}
    <div class="modes">
      <button type="submit" name="mode" value="auto" class="{% if cfg.mode == 'auto' %}on{% endif %}">{{ t('mode_auto') }}</button>
      <button type="submit" name="mode" value="manual" class="{% if cfg.mode == 'manual' %}on{% endif %}">{{ t('mode_manual') }}</button>
      <button type="submit" name="mode" value="paused" class="warn {% if cfg.mode == 'paused' %}on{% endif %}">{{ t('mode_paused') }}</button>
    </div>

    {# ── Manual EIN/AUS — only shown in manual mode ─────────────── #}
    {% if cfg.mode == 'manual' %}
    <div class="modes" style="margin-top:6px;">
      <button type="submit" name="manual_relay_on" value="on"
              class="{% if cfg.manual_relay_on %}on txt-g{% endif %}">{{ t('on') }}</button>
      <button type="submit" name="manual_relay_on" value="off"
              class="{% if not cfg.manual_relay_on %}on txt-a{% endif %}">{{ t('off') }}</button>
    </div>
    {% endif %}

  </form>
</section>

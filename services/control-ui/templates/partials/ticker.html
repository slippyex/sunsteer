{% set tk = ticker %}
{% if tk.relay_on %}<span class="led ledon"></span><span class="txt-g">{{ t('why_on') }}</span>
{% elif tk.relay_on is sameas false %}<span class="led off"></span><span class="txt-dim">{{ t('why_off') }}</span>
{% else %}<span class="led off"></span><span class="txt-dim">{{ t('ticker_unknown') }}</span>{% endif %}
<span class="txt-c">{{ tk.surplus_w if tk.surplus_w is not none else '–' }} W</span>
<span class="{{ 'txt-g' if tk.mode=='auto' else 'txt-a' if tk.mode=='manual' else 'txt-r' if tk.mode=='paused' else 'txt-dim' }}">{{ (tk.mode or '–')|upper }}</span>

{% set w = why %}
{% if w.state != 'unknown' %}
<div class="why" style="margin-top:10px;">
  <b>{{ w.headline }}</b>{% if w.detail %} {{ w.detail }}{% endif %}

  {# ── Optional progress bar ──────────────────────────────────────── #}
  {% if w.bar_label %}
    <div class="gauge" style="height:6px;margin-top:6px;"><i style="width: {{ (w.bar_pct * 100)|round|int }}%"></i></div>
    <div class="row2"><span>{{ w.bar_label }}</span></div>
  {% endif %}
</div>
{% else %}
<div class="why" style="margin-top:10px;">
  <b>{{ w.headline }}</b>
</div>
{% endif %}

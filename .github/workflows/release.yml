# Release: on tag vX.Y.Z build all services multi-arch (amd64 + arm64) and push
# to ghcr.io/<owner>/sunsteer/<service> with the semver tag and a sha tag.
# The test stage runs natively first as a gate — a red suite never ships.
name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service: [energy-exporter, surplus-controller, vicare-exporter, control-ui]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Gate — run test stage (native)
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          target: test
          push: false
          cache-from: type=gha,scope=test-${{ matrix.service }}
          cache-to: type=gha,scope=test-${{ matrix.service }},mode=max
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sunsteer/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          target: final
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-${{ matrix.service }}
          cache-to: type=gha,scope=release-${{ matrix.service }},mode=max

name: ✨ Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the idea! Please check open issues and Discussions first to avoid duplicates.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point. "I'm always frustrated when…"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - New meter driver
        - New relay / actuator
        - Control logic
        - Web UI
        - Observability (metrics / alerts / dashboards)
        - Deployment (Compose / Kubernetes)
        - Documentation
        - Other
    validations:
      required: false
  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to help implement this.
          required: false

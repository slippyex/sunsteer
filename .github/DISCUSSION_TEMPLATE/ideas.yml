title: "[Idea] "
body:
  - type: markdown
    attributes:
      value: |
        Got an idea for Sunsteer? Share it here to discuss before it becomes an issue.
        Please skim existing ideas first to avoid duplicates.
  - type: textarea
    id: problem
    attributes:
      label: What problem or use case?
      description: The pain point or scenario this would address.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Your idea
      description: What you'd like Sunsteer to do.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - New meter driver
        - New relay / actuator
        - Control logic
        - Web UI
        - Observability (metrics / alerts / dashboards)
        - Deployment (Compose / Kubernetes)
        - Documentation
        - Other
    validations:
      required: false
  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to help build this.
          required: false

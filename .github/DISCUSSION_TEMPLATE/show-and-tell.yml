title: "[Setup] "
body:
  - type: markdown
    attributes:
      value: |
        Running Sunsteer for real? Show it off — your setup helps others trust the project
        and decide what hardware to buy. Photos and screenshots welcome (redact any secrets
        or your exact address).
  - type: textarea
    id: setup
    attributes:
      label: Your setup
      description: PV size, grid meter, relay, heat pump / inverter — and anything notable about the install.
      placeholder: 15 kWp E/W, SMA Home Manager 2.0, Shelly Pro 1PM → Vitocal 250-A…
    validations:
      required: true
  - type: textarea
    id: results
    attributes:
      label: How is it going?
      description: Self-consumption, savings, surprises, lessons learned.
    validations:
      required: false
  - type: textarea
    id: tweaks
    attributes:
      label: Custom tweaks (optional)
      description: Driver you wrote, threshold tuning, dashboards, etc.
    validations:
      required: false
